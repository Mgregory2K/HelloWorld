name: GGG Award Research Balanced Pull

on:
  pull_request:
    paths:
      - 'ggg-balanced-trigger.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pull-balanced:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull balanced 1,000 likely-completed contract awards
        shell: bash
        run: |
          python - <<'PY'
          import csv, json, random, time
          from datetime import datetime
          from pathlib import Path
          import requests

          ENDPOINT = "https://api.usaspending.gov/api/v2/search/spending_by_award/"
          CUTOFF = datetime.fromisoformat("2026-07-15")
          DATE_START = "2021-10-01"
          DATE_END = "2024-09-30"
          random.seed(20260715)

          fields = [
              "Award ID", "Recipient Name", "Start Date", "End Date", "Award Amount",
              "Awarding Agency", "Awarding Sub Agency", "Contract Award Type",
              "NAICS", "PSC", "Description", "Primary Place of Performance",
              "generated_internal_id"
          ]

          bands = {
              "Launch $500-$5K": [(500,1000),(1000,2000),(2000,3000),(3000,4000),(4000,5000)],
              "Starter $5K-$25K": [(5000,8000),(8000,12000),(12000,16000),(16000,20000),(20000,25000)],
              "Scale $25K-$75K": [(25000,35000),(35000,45000),(45000,55000),(55000,65000),(65000,75000)],
              "Growth $75K-$250K": [(75000,100000),(100000,125000),(125000,150000),(150000,200000),(200000,250000)],
          }

          def parse_end(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(str(value)[:10])
              except Exception:
                  return None

          def fetch_slice(lower, upper):
              rows, seen = [], set()
              for page in range(1, 9):
                  payload = {
                      "subawards": False,
                      "limit": 100,
                      "page": page,
                      "filters": {
                          "award_type_codes": ["A", "B", "C", "D"],
                          "time_period": [{"start_date": DATE_START, "end_date": DATE_END, "date_type": "new_awards_only"}],
                          "award_amounts": [{"lower_bound": lower, "upper_bound": upper}]
                      },
                      "fields": fields,
                      "sort": "End Date",
                      "order": "desc"
                  }
                  for attempt in range(4):
                      resp = requests.post(ENDPOINT, json=payload, timeout=90)
                      if resp.status_code == 200:
                          break
                      time.sleep(2 * (attempt + 1))
                  resp.raise_for_status()
                  results = resp.json().get("results", [])
                  if not results:
                      break
                  for r in results:
                      rid = r.get("generated_internal_id") or (str(r.get("Award ID")) + "|" + str(r.get("Recipient Name")) + "|" + str(r.get("Award Amount")))
                      end = parse_end(r.get("End Date"))
                      if rid in seen or end is None or end > CUTOFF:
                          continue
                      seen.add(rid)
                      rows.append(r)
                  if len(results) < 100:
                      break
                  time.sleep(0.15)
              return rows

          selected, slice_summary = [], []
          for band_name, slices in bands.items():
              for lower, upper in slices:
                  pool = fetch_slice(lower, upper)
                  if len(pool) < 50:
                      raise RuntimeError(f"Insufficient ended awards in {band_name} {lower}-{upper}: {len(pool)}")
                  chosen = random.sample(pool, 50)
                  for r in chosen:
                      r["Exposure Band"] = band_name
                      r["Amount Slice"] = f"${lower:,.0f}-${upper:,.0f}"
                  selected.extend(chosen)
                  slice_summary.append({
                      "band": band_name, "lower": lower, "upper": upper,
                      "pool_count": len(pool), "selected": len(chosen),
                      "min_selected": min(float(x.get("Award Amount") or 0) for x in chosen),
                      "max_selected": max(float(x.get("Award Amount") or 0) for x in chosen)
                  })

          if len(selected) != 1000:
              raise RuntimeError(f"Expected 1000 rows; got {len(selected)}")

          def flatten(value):
              if isinstance(value, dict):
                  return value.get("code") or value.get("Code") or "", value.get("description") or value.get("Description") or ""
              return value or "", ""

          output = []
          for r in selected:
              naics_code, naics_desc = flatten(r.get("NAICS"))
              psc_code, psc_desc = flatten(r.get("PSC"))
              output.append({
                  "Award ID": r.get("Award ID", ""),
                  "Recipient Name": r.get("Recipient Name", ""),
                  "Start Date": r.get("Start Date", ""),
                  "End Date": r.get("End Date", ""),
                  "Award Amount": r.get("Award Amount", ""),
                  "Exposure Band": r.get("Exposure Band", ""),
                  "Amount Slice": r.get("Amount Slice", ""),
                  "Awarding Agency": r.get("Awarding Agency", ""),
                  "Awarding Sub Agency": r.get("Awarding Sub Agency", ""),
                  "Contract Award Type": r.get("Contract Award Type", ""),
                  "NAICS Code": naics_code,
                  "NAICS Description": naics_desc,
                  "PSC Code": psc_code,
                  "PSC Description": psc_desc,
                  "Description": r.get("Description", ""),
                  "Primary Place of Performance": r.get("Primary Place of Performance", ""),
                  "generated_internal_id": r.get("generated_internal_id", ""),
                  "Likely Completed": "Yes"
              })

          out = Path("ggg_balanced_output")
          out.mkdir(exist_ok=True)
          fieldnames = list(output[0].keys())
          with (out / "ggg_awards_balanced_1000.csv").open("w", newline="", encoding="utf-8-sig") as f:
              writer = csv.DictWriter(f, fieldnames=fieldnames)
              writer.writeheader()
              writer.writerows(output)

          summary = {
              "records": len(output),
              "unique_award_amounts": len({float(r["Award Amount"]) for r in output}),
              "min_award": min(float(r["Award Amount"]) for r in output),
              "max_award": max(float(r["Award Amount"]) for r in output),
              "slice_summary": slice_summary,
              "source_endpoint": ENDPOINT,
              "date_signed_window": [DATE_START, DATE_END],
              "completion_cutoff": CUTOFF.date().isoformat(),
              "sampling_seed": 20260715
          }
          (out / "ggg_balanced_summary.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload balanced research
        uses: actions/upload-artifact@v4
        with:
          name: ggg-award-balanced-research
          path: ggg_balanced_output/*
          retention-days: 7
